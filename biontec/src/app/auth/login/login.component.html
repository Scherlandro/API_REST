
<div>
  <mat-icon class="cursor-home" routerLink="" >home_circle</mat-icon>
  <mat-card-content class="container conteudo-login">

    <form class="card-logi" [formGroup]="formLogin" (ngSubmit)="onSubmit()">

      <div class="bottom-alert" *ngIf="showErrorMessage=='403'">
        Usuário ou senha inválida! Por favor tente novamente.
      </div>
      <div class="bottom-alert" *ngIf="showErrorMessage=='0'">
        Sistema OFF! Por favor tente novamente mais tarde.
      </div>

      <mat-card-content class="conteudo-login component-g">
        <h1>Login</h1>
        <mat-icon>account_circle</mat-icon>

        <mat-card class="component-g">
          <label>Email</label>
          <input class="input-login" type="email" name="email" id="email"
                 (dblclick)="clearInput()"
                 formControlName="username">
          <mat-error class="form_error" *ngIf="formLogin.get('username')?.invalid && formLogin.get('username')?.touched">
              {{ getErrorMessage() }}
          </mat-error>
        </mat-card>

        <mat-icon>vpn_key</mat-icon>
        <mat-card class="component-g">

          <label>Senha</label>
          <div>
          <input  class="input-login"  [type]="hide() ? 'password' : 'text'"
                  (dblclick)="clearInput()"
                  formControlName="password"
                  name="password" id="password"
          />
          <mat-icon
            (click)="clickEvent($event)"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="hide()"
          >
            {{hide() ? 'visibility_off' : 'visibility'}}
          </mat-icon>
          </div>
          <mat-error class="form_error" *ngIf="formLogin.get('password')?.invalid && formLogin.get('password')?.touched">
            <span *ngIf="formLogin.get('password')?.errors?.['required']">Senha é obrigatória</span>
            <span *ngIf="formLogin.get('password')?.errors?.['minlength']">Mínimo de 6 caracteres</span>
          </mat-error>
        </mat-card>

        <div class="spinner-container">
          <aside>

            <div *ngIf="spiner " class="spinner">
              <div></div>
              <div></div>
              <div></div>
              <div *ngIf="userIp">
                <h6> <strong>{{ userIp }}</strong></h6>
              </div>
              <div></div>
              <div></div>
            </div>
          </aside>
        </div>
        <mat-icon>plane</mat-icon>
        <button [disabled]="formLogin.invalid"
                class="bottom-container body"
                type="submit">
          <mat-icon>input</mat-icon>
          Login
        </button>
      </mat-card-content>
    </form>

    <button class="bottom-container body" (click)="newAccount()" >
      I still don't have account.</button>

  </mat-card-content>

</div>
