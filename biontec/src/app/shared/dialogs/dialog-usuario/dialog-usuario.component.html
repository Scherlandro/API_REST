<div class="body-user">
  <h1 mat-dialog-title class="dialog-header">
    {{ isChange ? 'Editar Usuário' : 'Novo Usuário' }}
  </h1>

  <div mat-dialog-content class="content-wrapper">
    <div class="photo-section">
      <div class="avatar-display" *ngIf="!showWebcam">
        <img [src]="iUser.fotoUsuario ? 'data:image/jpeg;base64,' + iUser.fotoUsuario : 'assets/default-avatar.png'"
             class="user-img">
      </div>

      <div class="webcam-box" *ngIf="showWebcam">
        <webcam [height]="200" [width]="200"
                [trigger]="triggerObservable"
                (imageCapture)="handleImage($event)"
                [videoOptions]="videoOptions">
        </webcam>
        <button mat-mini-fab color="warn" class="capture-btn" (click)="triggerSnapshot()">
          <mat-icon>camera_alt</mat-icon>
        </button>
      </div>

      <button mat-button color="primary" (click)="toggleWebcam()" class="action-photo-btn body">
        <mat-icon>{{ showWebcam ? 'close' : 'photo_camera' }}</mat-icon>
        {{ showWebcam ? 'Cancelar' : (iUser.fotoUsuario ? 'Alterar Foto' : 'Tirar Foto') }}
      </button>
    </div>

    <div class="form-grid">
      <mat-form-field appearance="outline" *ngIf="isChange">
        <mat-label>ID do Usuário</mat-label>
        <input matInput [(ngModel)]="iUser.id_usuario" readonly>
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Nome Completo</mat-label>
        <input matInput [(ngModel)]="iUser.name" required>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>E-mail</mat-label>
        <input matInput [(ngModel)]="iUser.username" [formControl]="emailControl">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input matInput type="password" [(ngModel)]="iUser.password" [formControl]="passwordControl">
        <mat-icon matSuffix>key</mat-icon>
      </mat-form-field>
    </div>
  </div>

  <div mat-dialog-actions align="end" class="actions-row">
    <button mat-button class="cancel-button" (click)="onCancel()">CANCELAR</button>
    <button mat-raised-button color="primary" class="body"
            [disabled]="isSaveButtonDisabled()"
            (click)="save(iUser)">
      SALVAR DADOS
    </button>
  </div>
</div>
